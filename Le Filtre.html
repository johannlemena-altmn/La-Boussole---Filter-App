<!DOCTYPE html>
<html lang="fr" data-theme="dark" data-accent="green">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Filtre — Triage éditorial v0.2</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ─── TOKENS (default = LIGHT) ────────────────────────────── */
  :root {
    --base-font-size: 16px;

    /* warm paper light */
    --bg: #f4eee2;
    --bg2: #ece5d4;
    --bg3: #e1d8c2;
    --card: #faf5e9;
    --card2: #f1ead8;
    --border: #d9ceb3;
    --border-strong: #b9ab8a;
    --text: #2a2418;
    --text-dim: #5a5040;
    --muted: #857a64;
    --muted-strong: #a89c80;
    --cream: #181410;

    /* accent palette — light variants pop deeper */
    --green: #4a7a3e;
    --green-dim: #d8e2c4;
    --terra: #b25a2e;
    --terra-dim: #f0d8c6;
    --gold: #9c7e1a;
    --gold-dim: #ecdfaf;
    --blue: #3a6e8a;
    --blue-dim: #d0dde6;
    --purple: #6b4a8a;
    --purple-dim: #e0d4ec;
    --orange: #c46d2e;
    --orange-dim: #f5dcc4;
    --red: #a64038;
    --red-dim: #f0d2cf;

    --serif: 'Syne', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --sans: 'DM Sans', system-ui, sans-serif;

    --shadow-sm: 0 1px 2px rgba(60,40,15,0.05), 0 0 0 1px rgba(60,40,15,0.02);
    --shadow-md: 0 4px 16px rgba(60,40,15,0.06);
    --shadow-lg: 0 20px 60px rgba(60,40,15,0.12);
  }

  /* dark theme — vert forêt + accents chauds */
  :root[data-theme="dark"] {
    --bg: #1a3d2b;
    --bg2: #142e20;
    --bg3: #1e4732;
    --card: #1f4535;
    --card2: #265040;
    --border: #2d5e40;
    --border-strong: #3a7852;
    --text: #cce8d2;
    --text-dim: #80b08a;
    --muted: #4e7c5e;
    --muted-strong: #3a5c48;
    --cream: #eef8e4;

    /* accents : jaune comme primaire, corail + or + sage */
    --green: #dce040;         /* jaune-lime — CTA principal, actif */
    --green-dim: #252e08;
    --terra: #f07050;         /* corail */
    --terra-dim: #3c1e10;
    --gold: #f0b030;          /* ambre chaud */
    --gold-dim: #302510;
    --blue: #60c8e0;
    --blue-dim: #0a2830;
    --purple: #c090e0;
    --purple-dim: #22103c;
    --orange: #f09850;
    --orange-dim: #3a2010;
    --red: #e87878;
    --red-dim: #3a1212;

    --shadow-sm: 0 1px 3px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,0,0,0.15);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.4);
    --shadow-lg: 0 20px 60px rgba(0,0,0,0.6);
  }

  /* accent override */
  :root[data-accent="terra"] { --green: #b25a2e; --green-dim: #f0d8c6; }
  :root[data-accent="blue"]  { --green: #3a6e8a; --green-dim: #d0dde6; }
  :root[data-theme="dark"][data-accent="terra"] { --green: #f07050; --green-dim: #3c1e10; }
  :root[data-theme="dark"][data-accent="blue"]  { --green: #60c8e0; --green-dim: #0a2830; }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: var(--base-font-size);
    line-height: 1.55;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background:
      radial-gradient(ellipse 900px 700px at 0% 0%, rgba(220,224,64,0.06) 0%, transparent 55%),
      radial-gradient(ellipse 700px 500px at 100% 100%, rgba(240,112,80,0.07) 0%, transparent 55%),
      radial-gradient(ellipse 600px 400px at 50% 0%, rgba(26,61,43,0.0) 0%, transparent 40%),
      var(--bg);
  }

  button, input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; background: none; border: none; outline: none; }
  button { cursor: pointer; }
  textarea { resize: vertical; line-height: 1.55; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  ::selection { background: var(--green-dim); color: var(--cream); }

  /* focus-visible — accessibility */
  *:focus-visible { outline: 2px solid var(--green); outline-offset: 2px; }

  /* ─── APP SHELL ─── */
  .app { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
  .sidebar {
    border-right: 1px solid var(--border);
    background: var(--bg2);
    padding: 32px 24px;
    display: flex; flex-direction: column; gap: 28px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }

  .brand { display: flex; flex-direction: column; gap: 6px; }
  .brand-label { font-family: var(--mono); font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: var(--green); opacity: 0.85; }
  .brand-title { font-family: var(--serif); font-size: 40px; font-weight: 800; line-height: 0.95; color: var(--cream); letter-spacing: -0.03em; }
  .brand-title em { font-style: normal; color: var(--green); }
  .brand-sub { font-size: 12px; color: var(--muted); line-height: 1.5; margin-top: 8px; }

  .manifest-link {
    margin-top: 8px; padding: 6px 10px;
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-dim); border: 1px solid var(--border-strong); border-radius: 3px;
    background: var(--bg); text-align: left; transition: all 0.15s;
    align-self: flex-start;
  }
  .manifest-link:hover { color: var(--green); border-color: var(--green); }

  .phases { display: flex; flex-direction: column; gap: 2px; }
  .phase-head { font-family: var(--mono); font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted-strong); margin-bottom: 10px; }
  .phase {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 10px 12px; border-radius: 4px; cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent; text-align: left; width: 100%;
  }
  .phase:hover { background: var(--card); }
  .phase.active { background: var(--card); border-color: var(--border-strong); }
  .phase-num { font-family: var(--mono); font-size: 11px; color: var(--muted); min-width: 18px; }
  .phase.active .phase-num, .phase.done .phase-num { color: var(--green); }
  .phase-body { flex: 1; }
  .phase-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .phase.active .phase-title { color: var(--cream); }
  .phase-meta { font-size: 11px; color: var(--muted); font-family: var(--mono); }

  .sidebar-foot { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
  .theme-switch {
    display: flex; gap: 0;
    border: 1px solid var(--border-strong); border-radius: 3px; overflow: hidden;
  }
  .theme-btn {
    flex: 1; padding: 6px 8px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted); background: var(--bg); transition: all 0.15s;
    border-right: 1px solid var(--border-strong);
  }
  .theme-btn:last-child { border-right: none; }
  .theme-btn:hover { color: var(--text); }
  .theme-btn.on { color: var(--cream); background: var(--card); }

  /* ─── MAIN ─── */
  .main { padding: 40px 48px 80px; max-width: 1320px; }
  .page-head { margin-bottom: 32px; }
  .page-head-label { font-family: var(--mono); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .page-head h1 { font-family: var(--serif); font-size: 42px; font-weight: 800; line-height: 1.05; color: var(--cream); margin-bottom: 12px; letter-spacing: -0.03em; }
  .page-head h1 em { font-style: normal; color: var(--green); }
  .page-head .sub { font-size: 15px; color: var(--text-dim); max-width: 680px; line-height: 1.65; }

  /* ─── COMMON ─── */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px; border-radius: 4px;
    font-size: 13px; font-weight: 500;
    border: 1px solid var(--border-strong); background: var(--card); color: var(--text);
    transition: all 0.15s; white-space: nowrap;
  }
  .btn:hover { border-color: var(--muted); background: var(--card2); }
  .btn-primary { background: var(--green); border-color: var(--green); color: #1a2e08; font-weight: 600; }
  .btn-primary:hover { background: var(--cream); border-color: var(--cream); color: var(--bg); }
  .btn-ghost { border-color: transparent; background: transparent; color: var(--muted); padding: 8px 10px; }
  .btn-ghost:hover { color: var(--text); background: var(--card); }
  .btn-danger { border-color: var(--red-dim); color: var(--red); }
  .btn-danger:hover { background: var(--red-dim); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-large { padding: 14px 24px; font-size: 14px; }
  .btn-arrow { font-family: var(--mono); font-size: 12px; }

  .input, .textarea, .select {
    width: 100%; padding: 10px 12px; border-radius: 4px;
    background: var(--bg); border: 1px solid var(--border-strong); color: var(--text);
    font-size: 13px; transition: border-color 0.15s;
  }
  .input:focus, .textarea:focus, .select:focus { border-color: var(--green); }
  .textarea { font-family: var(--sans); line-height: 1.6; }
  .label { display: block; font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 24px; box-shadow: var(--shadow-sm); }
  .panel + .panel { margin-top: 16px; }
  .panel-head { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .panel-title { font-family: var(--serif); font-size: 20px; font-weight: 700; color: var(--cream); }
  .panel-sub { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.5; }

  /* ─── TABS ─── */
  .tabs { display: flex; gap: 2px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
  .tab {
    padding: 10px 16px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--cream); border-color: var(--green); }
  .tab-count { margin-left: 6px; font-size: 10px; color: var(--muted-strong); }
  .tab.active .tab-count { color: var(--green); }

  /* ─── BLOC CHIPS ─── */
  .bloc-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 8px; border-radius: 3px;
    font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: 1px;
    border: 1px solid; white-space: nowrap;
  }
  .bloc-dot { width: 7px; height: 7px; border-radius: 50%; }
  .bloc-B1 { color: var(--green); background: var(--green-dim); border-color: rgba(74,122,62,0.3); }
  .bloc-B2 { color: var(--blue); background: var(--blue-dim); border-color: rgba(58,110,138,0.3); }
  .bloc-B3 { color: var(--purple); background: var(--purple-dim); border-color: rgba(107,74,138,0.3); }
  .bloc-B4 { color: var(--gold); background: var(--gold-dim); border-color: rgba(156,126,26,0.3); }
  .bloc-B5 { color: var(--red); background: var(--red-dim); border-color: rgba(166,64,56,0.3); }
  .bloc-B6 { color: var(--orange); background: var(--orange-dim); border-color: rgba(196,109,46,0.3); }

  .dot-B1, .bg-B1 { background: var(--green); }
  .dot-B2, .bg-B2 { background: var(--blue); }
  .dot-B3, .bg-B3 { background: var(--purple); }
  .dot-B4, .bg-B4 { background: var(--gold); }
  .dot-B5, .bg-B5 { background: var(--red); }
  .dot-B6, .bg-B6 { background: var(--orange); }

  /* ─── ITEMS ─── */
  .item-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 6px;
    padding: 14px 16px; display: grid; gap: 8px;
    transition: border-color 0.15s, background 0.15s; cursor: pointer;
  }
  .item-card:hover { border-color: var(--muted); }
  .item-card.selected { border-color: var(--green); background: var(--card2); }
  .item-title { font-size: 14px; font-weight: 500; color: var(--cream); line-height: 1.4; }
  .item-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.5px; }
  .item-preview { font-size: 12px; color: var(--text-dim); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .item-summary {
    font-size: 13px; color: var(--text); line-height: 1.6;
    padding: 8px 12px; border-left: 2px solid var(--green-dim); background: var(--bg2); border-radius: 0 3px 3px 0;
  }

  /* ─── SCORE ─── */
  .score-pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 12px;
    background: var(--bg3); border: 1px solid var(--border);
    font-family: var(--mono); font-size: 11px; color: var(--text); font-weight: 700;
  }
  .score-pill.high { color: var(--green); border-color: rgba(74,122,62,0.4); background: var(--green-dim); }
  .score-pill.mid  { color: var(--gold); border-color: rgba(156,126,26,0.4); background: var(--gold-dim); }
  .score-pill.low  { color: var(--muted); }

  .score-bars { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .score-bar { display: flex; flex-direction: column; gap: 4px; }
  .score-bar-label { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .score-bar-track { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .score-bar-fill { height: 100%; background: var(--green); transition: width 0.4s; }
  .score-bar-value { font-family: var(--mono); font-size: 11px; color: var(--text); }

  /* ─── STATUS ─── */
  .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 8px; border-radius: 3px;
    font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    border: 1px solid;
  }
  .status-pending { color: var(--muted); border-color: var(--border-strong); background: var(--bg3); }
  .status-analyzing { color: var(--gold); border-color: var(--gold); background: var(--gold-dim); animation: pulse 1.5s ease-in-out infinite; }
  .status-done { color: var(--green); border-color: rgba(74,122,62,0.4); background: var(--green-dim); }
  .status-error { color: var(--red); border-color: var(--red-dim); background: var(--red-dim); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

  /* ─── FICHE / TRIAGE ─── */
  .triage-layout { display: grid; grid-template-columns: 380px 1fr; gap: 16px; align-items: start; }
  .triage-list { display: flex; flex-direction: column; gap: 8px; max-height: calc(100vh - 240px); overflow-y: auto; padding-right: 4px; }
  .triage-detail {
    position: sticky; top: 24px;
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 28px; max-height: calc(100vh - 80px); overflow-y: auto; box-shadow: var(--shadow-sm);
  }
  .fiche-head { display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .fiche-title { font-family: var(--serif); font-size: 26px; font-weight: 700; line-height: 1.2; color: var(--cream); letter-spacing: -0.01em; }
  .fiche-meta-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .fiche-section { margin-bottom: 20px; }
  .fiche-section-label { font-family: var(--mono); font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .fiche-body { font-size: 14px; color: var(--text); line-height: 1.65; }
  .fiche-quote { padding: 10px 14px; border-left: 2px solid var(--green); background: var(--bg2); font-size: 13px; color: var(--text-dim); font-style: italic; border-radius: 0 3px 3px 0; margin-bottom: 6px; }
  .fiche-quote:last-child { margin-bottom: 0; }
  .fiche-tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .fiche-tag { padding: 4px 9px; border-radius: 3px; background: var(--bg3); border: 1px solid var(--border); font-size: 11px; color: var(--text-dim); }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-title { font-family: var(--serif); font-size: 19px; color: var(--text-dim); margin-bottom: 8px; font-style: italic; }

  /* ─── SETUP ─── */
  .setup-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
  .row-flex { display: flex; gap: 12px; align-items: center; padding: 12px 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; }
  .row-flex .name { font-size: 13px; font-weight: 500; color: var(--cream); }
  .row-flex .desc { font-size: 12px; color: var(--muted); line-height: 1.4; }
  .row-flex .block-area { flex: 1; min-width: 0; }
  .project-edit-grid { display: grid; grid-template-columns: 1fr 2fr auto; gap: 10px; align-items: start; }

  .icon-btn {
    width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center;
    border-radius: 3px; color: var(--muted); font-family: var(--mono); font-size: 14px;
    transition: all 0.15s; border: 1px solid transparent;
  }
  .icon-btn:hover { color: var(--text); background: var(--card2); border-color: var(--border-strong); }
  .icon-btn.danger:hover { color: var(--red); border-color: var(--red-dim); }

  /* ─── CAPTURE ─── */
  .capture-modes {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
    margin-bottom: 20px;
  }
  .cap-mode {
    display: flex; flex-direction: column; align-items: flex-start; gap: 4px;
    padding: 14px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 6px;
    transition: all 0.15s; text-align: left;
  }
  .cap-mode:hover { border-color: var(--muted); }
  .cap-mode.on { border-color: var(--green); background: var(--green-dim); }
  .cap-mode-glyph { font-family: var(--serif); font-size: 22px; color: var(--green); line-height: 1; margin-bottom: 4px; }
  .cap-mode-name { font-size: 13px; font-weight: 600; color: var(--cream); }
  .cap-mode-desc { font-size: 11px; color: var(--muted); font-family: var(--mono); }

  .capture-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 24px; align-items: start; }
  .capture-input textarea { min-height: 280px; font-family: var(--mono); font-size: 12px; line-height: 1.6; }
  .source-suggest { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .source-suggest-chip {
    padding: 4px 9px; border-radius: 12px; border: 1px solid var(--border-strong); background: var(--bg);
    font-size: 11px; color: var(--text-dim); cursor: pointer; transition: all 0.15s;
  }
  .source-suggest-chip:hover { border-color: var(--green); color: var(--green); }
  .source-suggest-chip.active { border-color: var(--green); color: var(--green); background: var(--green-dim); }

  .dropzone {
    border: 2px dashed var(--border-strong); border-radius: 8px;
    padding: 48px 24px; text-align: center;
    background: var(--bg2); cursor: pointer;
    transition: all 0.2s;
  }
  .dropzone:hover, .dropzone.drag {
    border-color: var(--green); background: var(--green-dim);
  }
  .dropzone.slim { padding: 14px; margin-top: 14px; }
  .dropzone-glyph { font-size: 40px; color: var(--muted); margin-bottom: 12px; font-family: var(--serif); }
  .dropzone-title { font-size: 15px; color: var(--cream); margin-bottom: 8px; font-weight: 500; }
  .dropzone-hint { line-height: 1.6; }

  .audio-mock {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
    padding: 32px; text-align: center;
  }
  .audio-record {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 12px 24px; border-radius: 24px;
    border: 1px solid var(--border-strong); background: var(--card);
    font-size: 13px; color: var(--text-dim);
  }
  .audio-record:disabled { opacity: 0.5; cursor: not-allowed; }
  .audio-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--red); }

  /* ─── ANALYSE / TOOLBAR ─── */
  .analyse-stat {
    display: flex; gap: 24px; align-items: center;
    padding: 16px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 6px;
    margin-bottom: 20px; box-shadow: var(--shadow-sm);
  }
  .stat-block { display: flex; flex-direction: column; gap: 2px; }
  .stat-val { font-family: var(--serif); font-size: 24px; font-weight: 700; color: var(--cream); }
  .stat-label { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .progress-bar { height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-bottom: 20px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--green) 0%, var(--gold) 100%); transition: width 0.4s; }

  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .toolbar .filler { flex: 1; }
  .filter-group { display: inline-flex; border: 1px solid var(--border-strong); border-radius: 4px; overflow: hidden; }
  .filter-btn {
    padding: 8px 12px; font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); border-right: 1px solid var(--border-strong); transition: all 0.15s; background: var(--bg);
  }
  .filter-btn:last-child { border-right: none; }
  .filter-btn:hover { color: var(--text); background: var(--card); }
  .filter-btn.active { color: var(--cream); background: var(--card2); }

  /* ─── SYNTHESE ─── */
  .synthese-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
  .synthese-card {
    padding: 18px 20px; background: var(--card); border: 1px solid var(--border);
    border-radius: 6px; border-left: 3px solid;
  }
  .synthese-card.B1 { border-left-color: var(--green); }
  .synthese-card.B2 { border-left-color: var(--blue); }
  .synthese-card.B3 { border-left-color: var(--purple); }
  .synthese-card.B4 { border-left-color: var(--gold); }
  .synthese-card.B5 { border-left-color: var(--red); }
  .synthese-card.B6 { border-left-color: var(--orange); }
  .synthese-card-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .synthese-card-title { font-family: var(--serif); font-size: 16px; color: var(--cream); font-weight: 700; }
  .synthese-count { font-family: var(--mono); font-size: 13px; color: var(--muted); }
  .synthese-card ul { list-style: none; margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
  .synthese-card li { font-size: 12px; color: var(--text-dim); line-height: 1.4; padding-left: 12px; position: relative; }
  .synthese-card li::before { content: '·'; position: absolute; left: 0; top: -2px; color: var(--muted-strong); }

  /* ─── VERBATIMS WALL ─── */
  .verbatim-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
  .verbatim-col { display: flex; flex-direction: column; gap: 10px; }
  .verbatim-head {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; border-radius: 4px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--cream); background: var(--bg2);
  }
  .verbatim-mark { font-size: 14px; line-height: 1; }
  .v-peur    .verbatim-head { color: var(--red);   border-left: 3px solid var(--red); }
  .v-incompr .verbatim-head { color: var(--gold);  border-left: 3px solid var(--gold); }
  .v-valeur  .verbatim-head { color: var(--green); border-left: 3px solid var(--green); }
  .v-neutre  .verbatim-head { color: var(--muted); border-left: 3px solid var(--muted-strong); }
  .verbatim-list { display: flex; flex-direction: column; gap: 8px; }
  .verbatim-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 4px;
    padding: 10px 12px;
  }
  .verbatim-text { font-size: 13px; color: var(--text); line-height: 1.55; font-style: italic; }
  .verbatim-source { margin-top: 6px; }

  /* ─── LIMITES ─── */
  .limites-panel { background: var(--bg2); border-style: dashed; }
  .limites-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
  .limite-cell { display: flex; gap: 10px; align-items: flex-start; }
  .limite-mark {
    font-family: var(--serif); font-size: 20px; color: var(--gold);
    min-width: 24px; text-align: center; line-height: 1;
  }

  /* ─── DASHBOARD ─── */
  .dash-grid { display: flex; flex-direction: column; gap: 16px; }
  .dash-widget {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 20px 24px; box-shadow: var(--shadow-sm);
    transition: opacity 0.15s, transform 0.15s;
  }
  .dash-widget.drag { opacity: 0.6; transform: scale(0.98); }
  .dash-widget-head {
    display: flex; align-items: center; gap: 12px;
    padding-bottom: 14px; border-bottom: 1px solid var(--border); margin-bottom: 18px;
  }
  .dash-drag {
    font-family: var(--mono); font-size: 14px; color: var(--muted-strong); cursor: grab;
    user-select: none; line-height: 1;
  }
  .dash-drag:active { cursor: grabbing; }
  .dash-widget-title { font-family: var(--serif); font-size: 18px; font-weight: 700; color: var(--cream); }
  .dash-widget-desc { font-size: 12px; color: var(--muted); }

  .dash-row { display: flex; flex-wrap: wrap; gap: 24px; align-items: center; }
  .dash-stat { display: flex; flex-direction: column; gap: 2px; min-width: 90px; }
  .dash-stat-val { font-family: var(--serif); font-size: 28px; font-weight: 700; color: var(--cream); line-height: 1; }
  .dash-stat-label { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
  .dash-stat-hint { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Stack — suivi coûts API */
  .stack-costs-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
    padding: 16px 20px; margin-bottom: 18px;
  }
  .stack-costs-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .stack-costs-cols { display: flex; gap: 0; }
  .stack-cost-col { flex: 1; text-align: center; padding: 4px 8px; }
  .stack-cost-sep { width: 1px; background: var(--border); align-self: stretch; margin: 0 8px; }
  .stack-cost-label { font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
  .stack-cost-value { font-family: var(--mono); font-size: 20px; font-weight: 700; color: var(--cream); letter-spacing: -0.5px; }
  .stack-cost-sub { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 3px; }
  .stack-limit-bar { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .stack-limit-fill { height: 100%; border-radius: 2px; transition: width 0.4s, background 0.3s; }

  /* Stack table */
  .stack-table {
    display: grid; grid-template-columns: 1.4fr 1.4fr 0.9fr 1.1fr 1.6fr;
    border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
  }
  .stack-row { display: contents; }
  .stack-row > div {
    padding: 12px 14px; border-bottom: 1px solid var(--border); background: var(--card);
    font-size: 12px; color: var(--text-dim); line-height: 1.5;
  }
  .stack-row.stack-head > div {
    background: var(--bg2);
    font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); font-weight: 500;
  }
  .stack-row:last-child > div { border-bottom: none; }
  .stack-name { font-weight: 600; color: var(--cream); margin-bottom: 2px; }
  .stack-layer { font-family: var(--mono); font-size: 10px; color: var(--green); letter-spacing: 1px; text-transform: uppercase; }

  .os-pill {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-family: var(--mono); font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
    border: 1px solid;
  }
  .os-oui { color: var(--green); border-color: rgba(74,122,62,0.4); background: var(--green-dim); }
  .os-non { color: var(--terra); border-color: rgba(178,90,46,0.4); background: var(--terra-dim); }
  .os-partiel { color: var(--gold); border-color: rgba(156,126,26,0.4); background: var(--gold-dim); }

  /* Networks */
  .networks-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
  .network-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
    padding: 14px; transition: all 0.15s;
  }
  .network-card.on { border-color: var(--green); background: var(--green-dim); }
  .network-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .network-name { font-weight: 600; color: var(--cream); font-size: 13px; }
  .network-scope { line-height: 1.4; margin-top: 4px; }
  .network-api { margin-top: 6px; }
  .switch {
    position: relative; width: 32px; height: 18px; border-radius: 10px;
    background: var(--border-strong); transition: background 0.15s; border: none;
  }
  .switch.on { background: var(--green); }
  .switch-knob {
    position: absolute; top: 2px; left: 2px;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--card); transition: left 0.15s;
  }
  .switch.on .switch-knob { left: 16px; }

  .alert {
    margin-top: 12px; padding: 10px 14px;
    background: var(--gold-dim); border: 1px solid var(--gold);
    border-radius: 4px; font-size: 12px; color: var(--gold);
  }

  /* Garde-fous */
  .gf-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
  .gf-card {
    display: flex; gap: 12px; padding: 14px;
    background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
  }
  .gf-mark {
    font-family: var(--serif); font-size: 24px; color: var(--gold);
    min-width: 28px; line-height: 1; text-align: center;
  }
  .gf-body h4 { font-family: var(--serif); font-size: 15px; color: var(--cream); margin-bottom: 4px; font-weight: 700; }
  .gf-body p { font-size: 12px; color: var(--text-dim); line-height: 1.5; }

  /* Inspirations */
  .inspi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
  .inspi-cat { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--green); margin-bottom: 8px; }
  .inspi-block ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .inspi-block li { font-size: 13px; line-height: 1.5; }

  /* ─── STUDIO ─── */
  .studio-toolbar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .studio-tool {
    display: flex; gap: 12px; align-items: center;
    padding: 16px 18px; background: var(--card); border: 1px solid var(--border); border-radius: 6px;
    transition: all 0.15s; text-align: left;
  }
  .studio-tool:hover { border-color: var(--muted); }
  .studio-tool.on { border-color: var(--green); background: var(--green-dim); }
  .studio-tool-glyph { font-family: var(--serif); font-size: 28px; color: var(--green); line-height: 1; }
  .studio-tool-name { font-size: 14px; font-weight: 600; color: var(--cream); }
  .studio-tool-desc { font-size: 12px; color: var(--muted); }

  .studio-stage { margin-bottom: 16px; }
  .studio-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 24px; box-shadow: var(--shadow-sm); }
  .studio-card-head { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .studio-card-head h3 { font-family: var(--serif); font-size: 20px; color: var(--cream); font-weight: 700; margin-bottom: 4px; }
  .studio-card-head .grow { flex: 1; }
  .studio-card-actions { display: flex; gap: 10px; align-items: center; padding-top: 14px; margin-top: 16px; border-top: 1px solid var(--border); }

  /* Mindmap */
  .mindmap-svg { width: 100%; height: auto; max-height: 520px; display: block; margin: 0 auto; }
  .mm-ring { fill: none; stroke: var(--border); stroke-width: 1; stroke-dasharray: 2 4; }
  .mm-core { fill: var(--cream); }
  .mm-core-label { font-family: var(--serif); font-size: 14px; fill: var(--bg); font-weight: 400; font-style: italic; }
  .mm-core-label-em { font-family: var(--serif); font-size: 14px; fill: var(--bg); font-weight: 700; font-style: italic; }
  .mm-ray { stroke: var(--border-strong); stroke-width: 1; opacity: 0.6; }
  .mm-link { stroke: var(--border-strong); stroke-width: 1; opacity: 0.5; }
  .mm-node { stroke: var(--card); stroke-width: 3; }
  .mm-node.mm-B1 { fill: var(--green); } .mm-ray.mm-B1 { stroke: var(--green); }
  .mm-node.mm-B2 { fill: var(--blue); }  .mm-ray.mm-B2 { stroke: var(--blue); }
  .mm-node.mm-B3 { fill: var(--purple); } .mm-ray.mm-B3 { stroke: var(--purple); }
  .mm-node.mm-B4 { fill: var(--gold); }  .mm-ray.mm-B4 { stroke: var(--gold); }
  .mm-node.mm-B5 { fill: var(--red); }   .mm-ray.mm-B5 { stroke: var(--red); }
  .mm-node.mm-B6 { fill: var(--orange); } .mm-ray.mm-B6 { stroke: var(--orange); }
  .mm-node-label { font-family: var(--mono); font-size: 12px; fill: var(--card); font-weight: 600; }
  .mm-node-count { font-family: var(--mono); font-size: 10px; fill: var(--card); opacity: 0.8; }
  .mm-sat { stroke: var(--card); stroke-width: 2; }
  .mm-legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
  .mm-leg-item { display: flex; align-items: center; gap: 6px; }

  /* Storyboard */
  .storyboard-track {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 14px;
  }
  .storyboard-cell {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
    padding: 14px; display: flex; flex-direction: column; gap: 10px;
  }
  .sb-thumb { position: relative; }
  .sb-num {
    position: absolute; top: 0; left: 0; z-index: 2;
    padding: 4px 8px; font-family: var(--mono); font-size: 10px;
    background: var(--cream); color: var(--bg); letter-spacing: 1px;
  }
  .sb-placeholder {
    aspect-ratio: 16/9; background:
      repeating-linear-gradient(45deg, var(--bg3) 0 8px, var(--bg2) 8px 16px);
    border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
    color: var(--muted); border-radius: 3px;
  }
  .sb-meta { display: flex; gap: 6px; flex-wrap: wrap; }
  .sb-title { font-family: var(--serif); font-size: 14px; color: var(--cream); font-weight: 600; line-height: 1.3; }
  .sb-narration, .sb-angle { font-size: 12px; }
  .sb-label { font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
  .sb-text { color: var(--text-dim); line-height: 1.5; }

  .level-switch { display: flex; gap: 4px; align-items: center; }
  .level-btn {
    padding: 5px 10px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted); border: 1px solid var(--border); border-radius: 3px; background: var(--bg);
    transition: all 0.15s;
  }
  .level-btn:hover { color: var(--text); border-color: var(--border-strong); }
  .level-btn.on { color: var(--cream); border-color: var(--green); background: var(--green-dim); }

  /* Infographic */
  .info-sheet {
    background: var(--card); border: 1px solid var(--border-strong); border-radius: 4px;
    padding: 36px 40px; max-width: 640px; margin: 0 auto;
    box-shadow: var(--shadow-md);
    aspect-ratio: 1 / 1.414;
    display: flex; flex-direction: column;
  }
  .info-head { border-bottom: 2px solid var(--cream); padding-bottom: 14px; margin-bottom: 20px; }
  .info-eyebrow { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--green); margin-bottom: 4px; }
  .info-title { font-family: var(--serif); font-size: 28px; font-weight: 700; color: var(--cream); line-height: 1.1; letter-spacing: -0.01em; }
  .info-title em { font-style: italic; color: var(--green); }
  .info-date { margin-top: 4px; }
  .info-section-label { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .info-bars { margin-bottom: 24px; }
  .info-bar-row { display: grid; grid-template-columns: 180px 1fr 30px; gap: 10px; align-items: center; padding: 5px 0; }
  .info-bar-name { display: flex; align-items: center; gap: 6px; }
  .info-bar-track { height: 6px; background: var(--bg3); border-radius: 1px; overflow: hidden; }
  .info-bar-fill { height: 100%; transition: width 0.4s; }
  .info-bar-count { text-align: right; }
  .info-callout {
    background: var(--bg2); border-left: 3px solid var(--gold); padding: 14px 18px;
    margin-bottom: 20px;
  }
  .info-callout-body { display: flex; gap: 12px; align-items: flex-start; font-size: 13px; line-height: 1.5; }
  .info-callout-mark { font-family: var(--serif); font-size: 22px; color: var(--gold); line-height: 1; }
  .info-foot { margin-top: auto; display: flex; justify-content: space-between; padding-top: 14px; border-top: 1px solid var(--border); }
  .info-dominant { display: flex; align-items: center; margin-top: 8px; flex-wrap: wrap; gap: 4px; }
  /* Layout 2 colonnes infographie */
  .info-cols { display: flex; gap: 24px; margin-bottom: 20px; flex: 1; min-height: 0; }
  .info-col-main { flex: 1.4; }
  .info-col-side { flex: 1; min-width: 0; }
  /* Termes */
  .info-terms { display: flex; flex-direction: column; gap: 4px; }
  .info-term-row { display: flex; align-items: baseline; gap: 6px; padding: 3px 0; }
  .info-term-rank { min-width: 16px; }
  .info-term-freq { margin-left: auto; }
  /* Sources pivot */
  .info-source-row { display: flex; gap: 8px; align-items: flex-start; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .info-source-row:last-child { border-bottom: none; }

  .studio-foot {
    margin-top: 20px; padding: 16px 20px;
    background: var(--bg2); border: 1px dashed var(--border-strong); border-radius: 4px;
    display: flex; gap: 14px; align-items: flex-start;
  }
  .studio-foot-mark { font-family: var(--serif); font-size: 22px; color: var(--green); line-height: 1; }

  /* ─── SCHEMA ACTIF (Infographie actionnable) ─── */
  @keyframes spin { to { transform: rotate(360deg); display: inline-block; } }
  .schema-layout { display: flex; gap: 20px; margin-top: 4px; }
  .schema-left { width: 230px; flex-shrink: 0; }
  .schema-right { flex: 1; min-width: 0; }
  .schema-col-label { display: block; margin-bottom: 8px; }
  .schema-item-list { display: flex; flex-direction: column; gap: 4px; max-height: 380px; overflow-y: auto; padding-right: 4px; }
  .schema-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: var(--bg); text-align: left; cursor: pointer; width: 100%;
    transition: all 0.15s;
  }
  .schema-item:hover { border-color: var(--border-strong); background: var(--bg2); }
  .schema-item.on { border-color: var(--green); background: var(--green-dim); }
  .schema-item-body { min-width: 0; flex: 1; }
  .schema-check {
    width: 16px; height: 16px; border: 1px solid var(--border-strong); border-radius: 2px;
    flex-shrink: 0; margin-top: 2px; font-size: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); color: var(--green); transition: all 0.15s;
  }
  .schema-check.on { background: var(--green); border-color: var(--green); color: white; }
  .schema-type-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
  .schema-type-btn {
    display: flex; align-items: center; gap: 6px; padding: 6px 12px;
    border: 1px solid var(--border); border-radius: 4px; background: var(--bg);
    font-family: var(--sans); font-size: 13px; cursor: pointer; transition: all 0.15s;
  }
  .schema-type-btn:hover { border-color: var(--border-strong); }
  .schema-type-btn.on { border-color: var(--green); background: var(--green-dim); color: var(--green); font-weight: 600; }
  .schema-type-glyph { font-size: 14px; }
  .schema-diagram {
    margin-top: 16px; padding: 20px;
    background: var(--card); border: 1px solid var(--border); border-radius: 6px;
    overflow: auto; max-height: 480px;
    display: flex; align-items: center; justify-content: center;
  }
  .schema-diagram svg { max-width: 100%; height: auto; }
  .schema-error { margin-top: 10px; padding: 10px 14px; background: var(--red-dim); border-radius: 4px; display: flex; align-items: center; }
  .schema-iter-zone { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .schema-iter-row { display: flex; gap: 10px; align-items: flex-end; }
  .schema-code-block {
    margin-top: 10px; padding: 16px; background: var(--bg3); border-radius: 4px;
    overflow-x: auto; border: 1px solid var(--border);
  }
  .schema-code-block pre { margin: 0; white-space: pre-wrap; color: var(--text-dim); font-size: 12px; }
  .btn-inline {
    background: none; border: none; cursor: pointer; color: var(--green);
    font-family: var(--mono); font-size: 11px; padding: 0; text-decoration: underline;
  }
  .btn-inline:hover { color: var(--text); }

  /* ─── TRACKER PROJETS (Phase 07) ─── */
  .tr-layout { display: flex; gap: 20px; }
  .tr-sidebar {
    width: 260px; flex-shrink: 0;
    display: flex; flex-direction: column; gap: 10px;
  }
  .tr-filters { display: flex; flex-wrap: wrap; gap: 5px; }
  .tr-filter-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 10px; border: 1px solid var(--border); border-radius: 3px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.5px;
    background: var(--bg); color: var(--text-dim); transition: all 0.12s;
  }
  .tr-filter-btn:hover { border-color: var(--muted); color: var(--text); }
  .tr-filter-btn.on { border-color: var(--green); background: var(--green-dim); color: var(--cream); }
  .tr-badge {
    min-width: 16px; height: 16px; padding: 0 4px;
    background: var(--bg3); border-radius: 8px;
    font-size: 9px; display: inline-flex; align-items: center; justify-content: center;
  }
  .tr-new-form { display: flex; flex-direction: column; gap: 4px; }
  .tr-input {
    width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 3px;
    background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px;
    outline: none; transition: border-color 0.12s;
  }
  .tr-input:focus { border-color: var(--green); }
  .tr-input::placeholder { color: var(--muted); }
  .tr-create-btn { width: 100%; justify-content: center; }
  .tr-project-list { display: flex; flex-direction: column; gap: 6px; max-height: 640px; overflow-y: auto; }
  .tr-project-card {
    display: flex; flex-direction: column; gap: 5px;
    padding: 12px 13px; border: 1px solid var(--border); border-radius: 5px;
    background: var(--bg); text-align: left; transition: all 0.12s; cursor: pointer; width: 100%;
  }
  .tr-project-card:hover { border-color: var(--muted); }
  .tr-project-card.on { border-color: var(--green); background: var(--green-dim); }
  .tr-project-card-top { display: flex; align-items: center; gap: 8px; }
  .tr-project-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .tr-project-dot.lg { width: 14px; height: 14px; flex-shrink: 0; }
  .tr-project-title { font-size: 13px; font-weight: 500; color: var(--cream); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tr-status-badge { font-family: var(--mono); font-size: 9px; padding: 2px 7px; border-radius: 2px; letter-spacing: 0.5px; flex-shrink: 0; }
  .tr-project-meta { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); }
  .tr-mini-bar { height: 3px; background: var(--bg3); border-radius: 1px; overflow: hidden; }
  .tr-mini-bar-fill { height: 100%; border-radius: 1px; }

  .tr-detail { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 0; }
  .tr-detail-empty { align-items: center; justify-content: center; min-height: 300px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 40px; }
  .tr-detail-head {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 18px 20px; background: var(--card); border: 1px solid var(--border);
    border-radius: 8px 8px 0 0; border-bottom: none;
  }
  .tr-detail-title-block { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
  .tr-title-input {
    font-family: var(--serif); font-size: 20px; font-weight: 700; color: var(--cream);
    background: transparent; border: none; outline: none; width: 100%;
    border-bottom: 1px solid transparent; transition: border-color 0.12s;
  }
  .tr-title-input:focus { border-bottom-color: var(--border-strong); }
  .tr-desc-input {
    font-family: var(--sans); font-size: 13px; color: var(--text-dim); line-height: 1.5;
    background: transparent; border: none; outline: none; resize: none; width: 100%;
    border-bottom: 1px solid transparent; transition: border-color 0.12s;
  }
  .tr-desc-input:focus { border-bottom-color: var(--border-strong); }
  .tr-desc-input::placeholder { color: var(--muted); }
  .tr-detail-controls { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
  .tr-status-row { display: flex; flex-direction: column; gap: 5px; }
  .tr-status-btns { display: flex; flex-direction: column; gap: 3px; }
  .tr-status-opt {
    padding: 3px 10px; border: 1px solid var(--border); border-radius: 3px;
    font-family: var(--mono); font-size: 10px; text-align: center; background: var(--bg);
    color: var(--muted); transition: all 0.12s;
  }
  .tr-status-opt:hover { border-color: var(--muted); }
  .tr-status-opt.on { font-weight: 700; }

  .tr-progress-block {
    padding: 14px 20px; border: 1px solid var(--border); border-top: none;
    background: var(--bg2); display: flex; flex-direction: column; gap: 7px;
  }
  .tr-progress-head { display: flex; justify-content: space-between; align-items: center; }
  .tr-progress-bar { height: 5px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .tr-progress-fill { height: 100%; border-radius: 2px; }
  .tr-graph { margin-top: 4px; }
  .tr-graph-empty { padding: 8px 0; font-style: italic; }

  .tr-section {
    padding: 16px 20px; border: 1px solid var(--border); border-top: none;
    background: var(--card); display: flex; flex-direction: column; gap: 8px;
  }
  .tr-section:last-child { border-radius: 0 0 8px 8px; }
  .tr-section-label { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .tr-tasks { display: flex; flex-direction: column; gap: 3px; }
  .tr-task {
    display: flex; gap: 10px; align-items: center;
    padding: 7px 10px; border-radius: 3px; border: 1px solid var(--border);
    background: var(--bg); transition: opacity 0.15s;
  }
  .tr-task.done { opacity: 0.55; }
  .tr-task-check {
    width: 18px; height: 18px; border: 1.5px solid var(--border-strong); border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); flex-shrink: 0; transition: all 0.12s;
  }
  .tr-task.done .tr-task-check { border-color: var(--green); background: var(--green-dim); }
  .tr-task-check-inner { font-family: var(--mono); font-size: 10px; color: var(--green); font-weight: 700; }
  .tr-task-text { flex: 1; font-size: 13px; color: var(--text); line-height: 1.4; }
  .tr-task.done .tr-task-text { text-decoration: line-through; color: var(--muted); }
  .tr-task-del {
    width: 20px; height: 20px; color: var(--muted); font-size: 16px; line-height: 1;
    border-radius: 3px; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.12s; flex-shrink: 0;
  }
  .tr-task:hover .tr-task-del { opacity: 1; }
  .tr-task-del:hover { color: var(--red); }
  .tr-add-task { display: flex; gap: 8px; }
  .tr-linked { display: flex; flex-direction: column; gap: 5px; }
  .tr-linked-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; border: 1px solid var(--border); border-radius: 3px; background: var(--bg);
  }
  .tr-linked-item.on { border-color: var(--green); background: var(--green-dim); }
  .tr-linked-title { flex: 1; font-size: 12px; color: var(--text-dim); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tr-linked-btn {
    padding: 2px 8px; font-family: var(--mono); font-size: 10px; border-radius: 2px;
    border: 1px solid var(--border); background: var(--bg); color: var(--muted);
    flex-shrink: 0; transition: all 0.12s;
  }
  .tr-linked-btn:hover { color: var(--cream); border-color: var(--muted); }
  .tr-linked-btn.add { color: var(--green); border-color: var(--green); }
  .tr-linked-btn.add:hover { background: var(--green-dim); }

  /* ─── HERMÈS · Second cerveau gamifié ─── */
  .hermes-section {
    border: 1px solid var(--border); border-top: none;
    background: var(--bg2);
  }
  .hermes-section:last-child { border-radius: 0 0 8px 8px; }
  .hermes-header {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px; cursor: pointer; user-select: none;
    transition: background 0.12s;
  }
  .hermes-header:hover { background: var(--bg3); }
  .hermes-header-label {
    font-family: var(--mono); font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted);
  }
  .hermes-level-badge {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 11px;
  }
  .hermes-level-icon { font-size: 14px; }
  .hermes-level-icon.graine { color: var(--muted); }
  .hermes-level-icon.pousse { color: var(--gold); }
  .hermes-level-icon.arbre  { color: var(--green); }
  .hermes-level-icon.foret  { color: var(--terra); }
  .hermes-xp-small { font-size: 10px; color: var(--muted); margin-left: 4px; }
  .hermes-streak-badge {
    margin-left: auto; font-family: var(--mono); font-size: 10px;
    color: var(--gold); padding: 2px 7px;
    border: 1px solid var(--gold-dim); border-radius: 10px;
    background: var(--gold-dim);
  }
  .hermes-toggle { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-left: 6px; flex-shrink: 0; }

  .hermes-body { padding: 0 20px 18px; display: flex; flex-direction: column; gap: 14px; }

  .hermes-xp-row { display: flex; flex-direction: column; gap: 5px; }
  .hermes-xp-meta { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .hermes-xp-bar { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .hermes-xp-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
  .hermes-xp-fill.graine { background: var(--muted); }
  .hermes-xp-fill.pousse { background: var(--gold); }
  .hermes-xp-fill.arbre  { background: var(--green); }
  .hermes-xp-fill.foret  { background: var(--terra); }

  .hermes-empty { padding: 14px 0; }
  .hermes-empty .dim { font-size: 13px; line-height: 1.6; }

  .hermes-question-zone { display: flex; flex-direction: column; gap: 10px; }
  .hermes-question-card {
    padding: 14px 16px; background: var(--card);
    border: 1px solid var(--border-strong); border-left: 3px solid var(--purple);
    border-radius: 4px; font-size: 14px; color: var(--cream);
    line-height: 1.55; font-style: italic;
  }
  .hermes-question-label { font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--purple); margin-bottom: 6px; }
  .hermes-answer-row { display: flex; gap: 10px; align-items: flex-end; }
  .hermes-xp-reward { font-family: var(--mono); font-size: 10px; color: var(--green); flex-shrink: 0; padding: 5px 0; }

  .hermes-feedback {
    padding: 10px 14px; background: var(--card);
    border: 1px solid var(--border); border-left: 3px solid var(--green);
    border-radius: 4px; font-size: 13px; color: var(--text-dim); line-height: 1.5;
    animation: fadeIn 0.3s ease;
  }
  .hermes-levelup {
    padding: 10px 14px; background: var(--terra-dim);
    border: 1px solid var(--terra); border-radius: 4px;
    font-family: var(--mono); font-size: 11px; color: var(--terra);
    display: flex; align-items: center; gap: 8px;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .hermes-gen-btn { width: 100%; justify-content: center; }
  .hermes-generating { color: var(--muted); font-family: var(--mono); font-size: 12px; display: flex; align-items: center; gap: 8px; padding: 8px 0; }
  .hermes-spin { display: inline-block; animation: spin 1s linear infinite; }

  .hermes-history { margin-top: 4px; }
  .hermes-history-toggle { font-family: var(--mono); font-size: 10px; color: var(--muted); cursor: pointer; text-decoration: underline; background: none; border: none; padding: 0; }
  .hermes-history-list { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; max-height: 280px; overflow-y: auto; }
  .hermes-history-item { border: 1px solid var(--border); border-radius: 4px; padding: 10px 12px; background: var(--bg); }
  .hermes-history-q { font-style: italic; font-size: 12px; color: var(--muted); margin-bottom: 4px; line-height: 1.4; }
  .hermes-history-a { font-size: 12px; color: var(--text-dim); line-height: 1.5; }
  .hermes-history-meta { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-top: 5px; }

  /* ─── FRAMEWORKS (Boîte à outils · 6 prismes) ─── */
  .framework-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px;
  }
  @media (max-width: 700px) { .framework-grid { grid-template-columns: 1fr; } }
  .framework-card {
    display: flex; flex-direction: column; gap: 8px;
    padding: 13px 14px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg); transition: border-color 0.12s;
  }
  .framework-card:hover { border-color: var(--muted); }
  .framework-card.active {
    border-color: var(--green); background: var(--green-dim);
  }
  .framework-card-top {
    display: flex; gap: 10px; align-items: flex-start; user-select: none;
  }
  .framework-icon {
    font-family: var(--mono); font-size: 15px; color: var(--green);
    flex-shrink: 0; margin-top: 1px; min-width: 24px;
  }
  .framework-info { flex: 1; min-width: 0; }
  .framework-label { font-size: 13px; font-weight: 600; color: var(--cream); margin-bottom: 2px; }
  .framework-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }
  .framework-expand { color: var(--muted); flex-shrink: 0; margin-top: 2px; }
  .framework-phases {
    display: flex; flex-wrap: wrap; gap: 4px;
  }
  .framework-phase-chip {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.5px;
    padding: 2px 7px; border-radius: 2px;
    background: var(--bg3); color: var(--muted); border: 1px solid var(--border);
  }
  .framework-card.active .framework-phase-chip {
    background: transparent; border-color: var(--green); color: var(--green);
  }
  .framework-questions {
    display: flex; flex-direction: column; gap: 6px;
    padding: 10px 0 4px; border-top: 1px solid var(--border);
  }
  .framework-question {
    display: flex; gap: 8px; align-items: flex-start; font-size: 12px; color: var(--text-dim); line-height: 1.45;
  }
  .framework-q-num {
    font-size: 10px; color: var(--green); min-width: 14px; margin-top: 1px;
  }
  .framework-actions { display: flex; justify-content: flex-end; }
  .framework-active-badge {
    font-family: var(--mono); font-size: 10px; color: var(--green); letter-spacing: 0.5px;
  }
  .btn-sm {
    padding: 4px 11px; font-size: 11px;
  }
  /* tab dot */
  .tab-dot {
    position: absolute; top: 4px; right: 4px;
    font-size: 7px; color: var(--green); line-height: 1;
  }

  /* ─── PRISME BAR (Analyse + Triage) ─── */
  .prisme-bar {
    margin-bottom: 12px;
    border: 1px solid var(--border); border-left: 3px solid var(--green);
    border-radius: 4px; background: var(--bg2); overflow: hidden;
  }
  .prisme-bar.open { background: var(--bg); }
  .prisme-bar-toggle {
    display: flex; align-items: center; gap: 8px; width: 100%;
    padding: 8px 12px; text-align: left; cursor: pointer; background: none; border: none;
  }
  .prisme-bar-toggle:hover { background: var(--bg3); }
  .prisme-bar-icon { font-family: var(--mono); font-size: 13px; color: var(--green); flex-shrink: 0; }
  .prisme-bar-label { font-size: 12px; color: var(--text-dim); flex-shrink: 0; }
  .prisme-bar-label strong { color: var(--cream); }
  .prisme-bar-phases { display: flex; flex-wrap: wrap; gap: 3px; flex: 1; }
  .prisme-mini-chip {
    font-family: var(--mono); font-size: 9px;
    padding: 1px 5px; border-radius: 2px;
    background: var(--bg3); color: var(--muted);
  }
  .prisme-bar-caret { color: var(--muted); flex-shrink: 0; }
  .prisme-bar-questions {
    padding: 4px 12px 12px 30px;
    display: flex; flex-direction: column; gap: 5px;
    border-top: 1px solid var(--border);
  }
  .prisme-bar-q {
    display: flex; gap: 8px; align-items: flex-start;
    font-size: 12px; color: var(--text-dim); line-height: 1.45;
  }
  .prisme-bar-q-num { font-size: 10px; color: var(--green); min-width: 14px; margin-top: 1px; }

  /* ─── LECTURE ACTIVE ─── */
  .la-container {}
  .la-layout { display: flex; gap: 20px; margin-top: 4px; }
  .la-sidebar {
    width: 230px; flex-shrink: 0;
    display: flex; flex-direction: column; gap: 5px;
    max-height: 680px; overflow-y: auto;
  }
  .la-sidebar-label { padding: 2px 0 8px; border-bottom: 1px solid var(--border); margin-bottom: 2px; }
  .la-item {
    display: flex; gap: 8px; align-items: flex-start;
    padding: 9px 11px; border: 1px solid var(--border); border-radius: 4px;
    background: var(--bg); text-align: left; transition: all 0.12s; cursor: pointer; width: 100%;
  }
  .la-item:hover { border-color: var(--muted); }
  .la-item.on { border-color: var(--green); background: var(--green-dim); }
  .la-item.done .la-item-text { opacity: 0.65; }
  .la-item-text { flex: 1; min-width: 0; }
  .la-check { font-family: var(--mono); font-size: 10px; color: var(--green); font-weight: 700; flex-shrink: 0; margin-top: 3px; }
  .la-form { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 0; }
  .la-item-head {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 10px 14px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 4px 4px 0 0; border-bottom: none;
  }
  .la-step {
    display: flex; gap: 14px;
    padding: 16px 14px; border: 1px solid var(--border); border-top: none;
    background: var(--card);
  }
  .la-step:last-of-type { border-radius: 0 0 4px 4px; }
  .la-step-num {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--bg3); border: 1px solid var(--border-strong);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    color: var(--muted); flex-shrink: 0; margin-top: 2px;
  }
  .la-step-body { flex: 1; min-width: 0; }
  .la-step-title { font-family: var(--serif); font-size: 16px; font-weight: 700; color: var(--cream); margin-bottom: 3px; }
  .la-step-hint { margin-bottom: 10px; }
  .la-field-label { font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; display: block; }
  .la-textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
    padding: 8px 10px; font-family: var(--sans); font-size: 13px; color: var(--text);
    line-height: 1.5; resize: vertical; outline: none; transition: border-color 0.12s;
  }
  .la-textarea:focus { border-color: var(--green); }
  .la-textarea::placeholder { color: var(--muted); }
  .la-usages { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 4px; }
  .la-usage-btn {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 10px 11px; border: 1px solid var(--border); border-radius: 4px;
    background: var(--bg); text-align: left; transition: all 0.12s; cursor: pointer; width: 100%;
  }
  .la-usage-btn:hover { border-color: var(--muted); }
  .la-usage-btn.on { border-color: var(--green); background: var(--green-dim); }
  .la-usage-icon { font-family: var(--mono); font-size: 13px; color: var(--green); line-height: 1.5; flex-shrink: 0; }
  .la-usage-desc { font-size: 11px; color: var(--muted); line-height: 1.4; margin-top: 1px; }
  .la-empty-form { align-items: center; justify-content: center; min-height: 280px; }

  /* ─── CLUSTER (verbatim viz 2D / 3D) ─── */
  .cluster { display: flex; flex-direction: column; gap: 12px; }
  .cluster.is-3d .cluster-stage { background:
    radial-gradient(ellipse at center, var(--bg2) 0%, var(--bg) 70%);
  }
  .cluster-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .cluster-slider { display: flex; gap: 8px; align-items: center; }
  .cluster-slider input[type="range"] { width: 100px; }
  .cluster-stage {
    position: relative; background: var(--bg2);
    border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
  }
  .cluster-svg { width: 100%; height: auto; display: block; touch-action: none; user-select: none; }
  .cluster-edge { stroke: var(--muted-strong); }
  .dof-ring { fill: none; stroke: var(--border); stroke-width: 1; stroke-dasharray: 2 6; opacity: 0.4; }
  .cluster-node .cnode { stroke: var(--card); stroke-width: 2; }
  .cluster-node:hover .cnode { stroke: var(--cream); stroke-width: 2.5; }
  .cluster-node.sel .cnode { stroke: var(--cream); stroke-width: 3; }
  .cluster-node.sel .cluster-label { font-weight: 700; fill: var(--cream); }
  .cnode.mm-B1 { fill: var(--green); }
  .cnode.mm-B2 { fill: var(--blue); }
  .cnode.mm-B3 { fill: var(--purple); }
  .cnode.mm-B4 { fill: var(--gold); }

  (function() {

    window.lf_stats = { totalIn: 0, totalOut: 0, calls: [], errors: 0 };

    /* ── Suivi coûts persistant par jour ── */
    var LF_COSTS_KEY = 'lf-costs-v2';
    var _costAtLastSave = 0;

    function lfCostsLoad() {
      try { return JSON.parse(localStorage.getItem(LF_COSTS_KEY)) || { monthlyLimit: 10, history: [] }; }
      catch { return { monthlyLimit: 10, history: [] }; }
    }
    function lfCostsSave() {
      var currentEur = tokenCostEur(window.lf_stats.totalIn, window.lf_stats.totalOut);
      var increment = currentEur - _costAtLastSave;
      if (increment < 0.000001) return;
      _costAtLastSave = currentEur;
      var today = new Date().toISOString().slice(0, 10);
      var data = lfCostsLoad();
      var idx = data.history.findIndex(function(h) { return h.date === today; });
      var rounded = Math.round(increment * 100000) / 100000;
      if (idx >= 0) {
        data.history[idx].eur = Math.round((data.history[idx].eur + rounded) * 100000) / 100000;
      } else {
        data.history.push({ date: today, eur: rounded });
      }
      data.history = data.history.slice(-90); // 90 jours max
      try { localStorage.setItem(LF_COSTS_KEY, JSON.stringify(data)); } catch {}
    }
    // Expose pour le widget Stack
    window.lfCosts = { load: lfCostsLoad, save: function(l) {
      var d = lfCostsLoad(); d.monthlyLimit = l;
      try { localStorage.setItem(LF_COSTS_KEY, JSON.stringify(d)); } catch {};
    }};

    function tokenCostEur(inTok, outTok) {
      return ((inTok * PRICE_IN + outTok * PRICE_OUT) / 1e6) * USD_TO_EUR;
    }

    /* ── Bannière clé API ── */
    function buildBanner() {
      var bar = document.createElement('div');
      bar.id = 'lf-banner';
      bar.innerHTML =
        '<span class="lf-badge">⚡ LOCAL</span>' +
        '<input id="lf-key" type="password" autocomplete="off" spellcheck="false"' +
        '  placeholder="sk-ant-api03-…  ← clé API Anthropic">' +
        '<span id="lf-st">○ clé requise</span>' +
        '<span id="lf-pg"></span>';
      document.body.prepend(bar);
      document.body.style.paddingTop =
        ((parseInt(getComputedStyle(document.body).paddingTop) || 0) + 44) + 'px';

      var inp = document.getElementById('lf-key');
      inp.value = apiKey;
      function saveKey() {
        apiKey = inp.value.trim();
        try { localStorage.setItem(STORAGE_KEY, apiKey); } catch(e) {}
        setStatus(apiKey ? 'ready' : 'empty');
      }
      inp.addEventListener('change', saveKey);
      inp.addEventListener('blur',   saveKey);
      setStatus(apiKey ? 'ready' : 'empty');
    }

    function setStatus(s) {
      var el = document.getElementById('lf-st');
      if (!el) return;
      if (s === 'ready')    { el.textContent = '● prête';    el.style.color = '#6e9e72'; }
      else if (s === 'empty') { el.textContent = '○ clé requise'; el.style.color = '#c47050'; }
      else if (s === 'busy')  { el.textContent = '● analyse…';   el.style.color = '#c9a84c'; }
      else { el.textContent = '✗ ' + s; el.style.color = '#c47050'; }
    }

    /* ── Widget coût ── */
    function buildCostWidget() {
      var w = document.createElement('div');
      w.id = 'lf-cost-widget';
      w.innerHTML =
        '<div id="lf-cost-panel">' +
          '<h4>📊 Consommation</h4>' +
          '<div class="lf-stat-row"><span class="lf-label">Coût total</span><span class="lf-val lf-big" id="lf-c-total">€0.000000</span></div>' +
          '<hr class="lf-divider">' +
          '<div class="lf-stat-row"><span class="lf-label">Tokens entrée</span><span class="lf-val" id="lf-c-in">0</span></div>' +
          '<div class="lf-stat-row"><span class="lf-label">Tokens sortie</span><span class="lf-val" id="lf-c-out">0</span></div>' +
          '<div class="lf-stat-row"><span class="lf-label">Appels réussis</span><span class="lf-val" id="lf-c-calls">0</span></div>' +
          '<div class="lf-stat-row"><span class="lf-label">Coût moyen/appel</span><span class="lf-val" id="lf-c-avg">€0.000000</span></div>' +
          '<div id="lf-chart-wrap">' +
            '<div id="lf-chart-label">Coût par appel (€)</div>' +
            '<div id="lf-chart-bars"></div>' +
          '</div>' +
          '<button class="lf-reset-btn" id="lf-reset-btn">Réinitialiser</button>' +
          '<div class="lf-note">Haiku 4.5 · $0.80/$4.00 MTok · ~USD→EUR 0.92</div>' +
        '</div>' +
        '<div id="lf-cost-pill">' +
          '<span class="lf-dot" id="lf-dot"></span>' +
          '<span id="lf-pill-txt">0 tokens · €0.000000</span>' +
          '<span style="color:#3a5e3e;font-size:10px">▲</span>' +
        '</div>';
      document.body.appendChild(w);

      document.getElementById('lf-cost-pill').addEventListener('click', function() {
        var panel = document.getElementById('lf-cost-panel');
        panel.classList.toggle('open');
        var arrow = this.querySelector('span:last-child');
        arrow.textContent = panel.classList.contains('open') ? '▼' : '▲';
      });

      document.getElementById('lf-reset-btn').addEventListener('click', function() {
        window.lf_stats = { totalIn: 0, totalOut: 0, calls: [], errors: 0 };
        refreshWidget(0);
      });
    }

    function refreshWidget(callCost) {
      var s = window.lf_stats;
      var total = tokenCostEur(s.totalIn, s.totalOut);
      var n = s.calls.length;
      var avg = n > 0 ? total / n : 0;

      /* Pill */
      var totalTok = s.totalIn + s.totalOut;
      var pill = document.getElementById('lf-pill-txt');
      if (pill) pill.textContent = fmt(totalTok) + ' tok · €' + total.toFixed(6);

      /* Panel */
      setText('lf-c-total', '€' + total.toFixed(6));
      setText('lf-c-in',    fmt(s.totalIn));
      setText('lf-c-out',   fmt(s.totalOut));
      setText('lf-c-calls', n);
      setText('lf-c-avg',   '€' + avg.toFixed(6));

      /* Chart */
      var bars = document.getElementById('lf-chart-bars');
      if (!bars) return;
      bars.innerHTML = '';
      var slice = s.calls.slice(-30);
      var maxC = Math.max.apply(null, slice.map(function(c){ return c.cost; })) || 1;
      slice.forEach(function(c) {
        var b = document.createElement('div');
        b.className = 'lf-bar';
        b.style.height = Math.max(3, Math.round((c.cost / maxC) * 44)) + 'px';
        b.title = 'Appel #' + c.idx + '\n€' + c.cost.toFixed(6) +
                  '\nEntrée: ' + c.inTok + ' · Sortie: ' + c.outTok;
        bars.appendChild(b);
      });
    }

    function fmt(n) {
      if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
      if (n >= 1e3) return (n/1e3).toFixed(1) + 'k';
      return String(n);
    }
    function setText(id, v) {
      var el = document.getElementById(id); if (el) el.textContent = v;
    }

    function setDot(state) {
      var d = document.getElementById('lf-dot');
      if (!d) return;
      if (state === 'busy')  { d.style.background = '#c9a84c'; d.classList.add('pulse'); }
      else if (state === 'err') { d.style.background = '#c47050'; d.classList.remove('pulse'); }
      else { d.style.background = '#4a8e50'; d.classList.remove('pulse'); }
    }

    /* ── Queue sérialisée ── */
    var queue   = Promise.resolve();
    var callIdx = 0;
    function sleep(ms) { return new Promise(function(r){ setTimeout(r, ms); }); }

    /* content = string (text) OU array (multimodal) — les deux sont acceptés par l'API Anthropic */
    async function callAnthropic(content) {
      var resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key'                               : apiKey,
          'anthropic-version'                        : '2023-06-01',
          'content-type'                             : 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: MODEL, max_tokens: MAX_TOKENS,
          messages: [{ role: 'user', content: content }]
        })
      });
      if (!resp.ok) {
        var err = {}; try { err = await resp.json(); } catch(e) {}
        throw new Error((err.error && err.error.message) || 'HTTP ' + resp.status);
      }
      var result = await resp.json();
      var inTok  = (result.usage && result.usage.input_tokens)  || 0;
      var outTok = (result.usage && result.usage.output_tokens) || 0;
      return { text: result.content[0].text, inTok: inTok, outTok: outTok };
    }

    function makeQueuedCall(content, label) {
      callIdx++;
      var idx = callIdx;
      queue = queue.then(async function() {
        await sleep(DELAY_MS);
        var pg = document.getElementById('lf-pg');
        if (pg) pg.textContent = '⏳ ' + idx + '/' + callIdx + '…' + (label ? ' ' + label : '');
        setStatus('busy'); setDot('busy');
        if (!apiKey) {
          var inp = document.getElementById('lf-key');
          if (inp) { inp.style.borderColor = '#c47050'; inp.focus(); }
          setDot('err');
          throw new Error('Clé API manquante — colle-la dans la barre verte en haut.');
        }
        try {
          var res  = await callAnthropic(content);
          var cost = tokenCostEur(res.inTok, res.outTok);
          window.lf_stats.totalIn  += res.inTok;
          window.lf_stats.totalOut += res.outTok;
          window.lf_stats.calls.push({ idx: idx, inTok: res.inTok, outTok: res.outTok, cost: cost });
          refreshWidget(cost);
          lfCostsSave();
          setStatus('ready'); setDot('idle');
          if (pg) pg.textContent = '✓ ' + idx + ' traité' + (idx > 1 ? 's' : '');
          return res.text;
        } catch(err) {
          window.lf_stats.errors++;
          setStatus(err.message || 'erreur'); setDot('err');
          if (pg) pg.textContent = '⚠ ' + idx + ' échoué';
          throw err;
        }
      });
      return queue;
    }

    /* ── window.claude ── */
    window.claude = {
      /* Appel texte standard */
      complete: function(prompt) {
        return makeQueuedCall(prompt, '');
      },
      /* Appel multimodal — content = tableau [{type:"image",...},{type:"text",...}] */
      completeMultimodal: function(contentArray) {
        return makeQueuedCall(contentArray, '📷 Vision');
      }
    };

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function() { buildBanner(); buildCostWidget(); });
    } else {
      buildBanner(); buildCostWidget();
    }
    console.info('[Le Filtre Local v2] ✓ window.claude.complete + token tracker (' + MODEL + ')');
  })();
  </script>
