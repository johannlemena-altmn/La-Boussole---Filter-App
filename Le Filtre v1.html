<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Filtre — Triage éditorial</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0c09;
    --bg2: #161410;
    --bg3: #1f1d19;
    --card: #252219;
    --card2: #2c2920;
    --border: #2e2b23;
    --border-strong: #3d3a31;
    --text: #ede8de;
    --text-dim: #b5ad9d;
    --muted: #7a7468;
    --muted-strong: #5a5447;
    --cream: #f0ebe0;

    --green: #6e9e72;
    --green-dim: #2d4030;
    --terra: #c4714f;
    --terra-dim: #3d2318;
    --gold: #c9a84c;
    --gold-dim: #3a2e12;
    --blue: #5b89a6;
    --blue-dim: #1a2d3a;
    --purple: #8b6fa8;
    --purple-dim: #2a1f38;
    --orange: #d68b4f;
    --orange-dim: #3a230e;
    --red: #b85a5a;
    --red-dim: #3a1818;

    --serif: 'Playfair Display', Georgia, serif;
    --mono: 'Space Mono', ui-monospace, monospace;
    --sans: 'DM Sans', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.55;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background:
      radial-gradient(ellipse 800px 600px at 0% 0%, rgba(110,158,114,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 800px 600px at 100% 100%, rgba(196,113,79,0.03) 0%, transparent 60%),
      var(--bg);
  }

  button, input, textarea, select {
    font-family: inherit;
    font-size: inherit;
    color: inherit;
    background: none;
    border: none;
    outline: none;
  }

  button { cursor: pointer; }
  textarea { resize: vertical; line-height: 1.55; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  ::selection { background: var(--green-dim); color: var(--cream); }

  /* ─── APP SHELL ─── */
  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
  }

  .sidebar {
    border-right: 1px solid var(--border);
    background: var(--bg2);
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .brand-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--green);
  }
  .brand-title {
    font-family: var(--serif);
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
    color: var(--cream);
  }
  .brand-title em {
    font-style: italic;
    color: var(--green);
  }
  .brand-sub {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    margin-top: 6px;
  }

  .phases {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .phase-head {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted-strong);
    margin-bottom: 10px;
  }
  .phase {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
    text-align: left;
    width: 100%;
  }
  .phase:hover { background: var(--card); }
  .phase.active {
    background: var(--card);
    border-color: var(--border-strong);
  }
  .phase-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    min-width: 18px;
  }
  .phase.active .phase-num,
  .phase.done .phase-num { color: var(--green); }
  .phase-body { flex: 1; }
  .phase-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }
  .phase.active .phase-title { color: var(--cream); }
  .phase-meta {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
  }

  .sidebar-foot {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted-strong);
    letter-spacing: 1px;
  }

  /* ─── MAIN ─── */
  .main {
    padding: 40px 48px 80px;
    max-width: 1280px;
  }

  .page-head {
    margin-bottom: 32px;
  }
  .page-head-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .page-head h1 {
    font-family: var(--serif);
    font-size: 36px;
    font-weight: 700;
    line-height: 1.1;
    color: var(--cream);
    margin-bottom: 10px;
  }
  .page-head h1 em { font-style: italic; color: var(--green); }
  .page-head .sub {
    font-size: 14px;
    color: var(--muted);
    max-width: 620px;
    line-height: 1.7;
  }

  /* ─── COMMON ─── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid var(--border-strong);
    background: var(--card);
    color: var(--text);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover {
    border-color: var(--muted);
    background: var(--card2);
  }
  .btn-primary {
    background: var(--green-dim);
    border-color: var(--green);
    color: var(--green);
  }
  .btn-primary:hover {
    background: var(--green);
    color: var(--bg);
  }
  .btn-ghost {
    border-color: transparent;
    background: transparent;
    color: var(--muted);
    padding: 8px 10px;
  }
  .btn-ghost:hover {
    color: var(--text);
    background: var(--card);
  }
  .btn-danger {
    border-color: var(--red-dim);
    color: var(--red);
  }
  .btn-danger:hover {
    background: var(--red-dim);
  }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .btn-arrow {
    font-family: var(--mono);
    font-size: 12px;
  }

  .input, .textarea, .select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 4px;
    background: var(--bg2);
    border: 1px solid var(--border-strong);
    color: var(--text);
    font-size: 13px;
    transition: border-color 0.15s;
  }
  .input:focus, .textarea:focus, .select:focus {
    border-color: var(--green);
  }
  .textarea { font-family: var(--sans); line-height: 1.6; }
  .label {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
  }
  .panel + .panel { margin-top: 16px; }
  .panel-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .panel-title {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 700;
    color: var(--cream);
  }
  .panel-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
    line-height: 1.5;
  }

  /* ─── TABS (within panels) ─── */
  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 10px 16px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--cream);
    border-color: var(--green);
  }
  .tab-count {
    margin-left: 6px;
    font-size: 10px;
    color: var(--muted-strong);
  }
  .tab.active .tab-count { color: var(--green); }

  /* ─── ROW / LIST ─── */
  .row {
    display: grid;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .row:last-child { border-bottom: none; }

  .row-grid {
    display: grid;
    grid-template-columns: 32px 1fr 1.5fr 1fr 32px;
    gap: 12px;
    align-items: center;
  }
  .row-mono {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  /* ─── BLOC chips ─── */
  .bloc-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 8px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    border: 1px solid;
    white-space: nowrap;
  }
  .bloc-dot {
    width: 7px; height: 7px; border-radius: 50%;
  }
  .bloc-B1 { color: var(--green); background: var(--green-dim); border-color: rgba(110,158,114,0.3); }
  .bloc-B2 { color: var(--blue); background: var(--blue-dim); border-color: rgba(91,137,166,0.3); }
  .bloc-B3 { color: var(--purple); background: var(--purple-dim); border-color: rgba(139,111,168,0.3); }
  .bloc-B4 { color: var(--gold); background: var(--gold-dim); border-color: rgba(201,168,76,0.3); }
  .bloc-B5 { color: var(--red); background: var(--red-dim); border-color: rgba(184,90,90,0.3); }
  .bloc-B6 { color: var(--orange); background: var(--orange-dim); border-color: rgba(214,139,79,0.3); }

  .dot-B1 { background: var(--green); }
  .dot-B2 { background: var(--blue); }
  .dot-B3 { background: var(--purple); }
  .dot-B4 { background: var(--gold); }
  .dot-B5 { background: var(--red); }
  .dot-B6 { background: var(--orange); }

  /* ─── ITEM CARDS (capture/triage) ─── */
  .item-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    display: grid;
    gap: 8px;
    transition: border-color 0.15s, background 0.15s;
    cursor: pointer;
  }
  .item-card:hover { border-color: var(--muted); }
  .item-card.selected {
    border-color: var(--green);
    background: var(--card2);
  }
  .item-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--cream);
    line-height: 1.4;
  }
  .item-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }
  .item-preview {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ─── SCORE ─── */
  .score-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 12px;
    background: var(--bg3);
    border: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    font-weight: 700;
  }
  .score-pill.high { color: var(--green); border-color: var(--green-dim); background: var(--green-dim); }
  .score-pill.mid { color: var(--gold); border-color: var(--gold-dim); background: var(--gold-dim); }
  .score-pill.low { color: var(--muted); }

  .score-bars {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }
  .score-bar {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .score-bar-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .score-bar-track {
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
  }
  .score-bar-fill {
    height: 100%;
    background: var(--green);
    transition: width 0.4s;
  }
  .score-bar-value {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
  }

  /* ─── STATUS ─── */
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 8px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border: 1px solid;
  }
  .status-pending { color: var(--muted); border-color: var(--border-strong); background: var(--bg3); }
  .status-analyzing { color: var(--gold); border-color: var(--gold); background: var(--gold-dim); animation: pulse 1.5s ease-in-out infinite; }
  .status-done { color: var(--green); border-color: var(--green-dim); background: var(--green-dim); }
  .status-error { color: var(--red); border-color: var(--red-dim); background: var(--red-dim); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }

  /* ─── FICHE DETAIL ─── */
  .triage-layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 16px;
    align-items: start;
  }
  .triage-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: calc(100vh - 240px);
    overflow-y: auto;
    padding-right: 4px;
  }
  .triage-detail {
    position: sticky;
    top: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px;
    max-height: calc(100vh - 80px);
    overflow-y: auto;
  }

  .fiche-head {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .fiche-title {
    font-family: var(--serif);
    font-size: 24px;
    font-weight: 700;
    line-height: 1.2;
    color: var(--cream);
  }
  .fiche-meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }

  .fiche-section { margin-bottom: 20px; }
  .fiche-section-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .fiche-body {
    font-size: 13px;
    color: var(--text);
    line-height: 1.65;
  }
  .fiche-quote {
    padding: 10px 14px;
    border-left: 2px solid var(--green);
    background: var(--bg2);
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
    border-radius: 0 3px 3px 0;
    margin-bottom: 6px;
  }
  .fiche-quote:last-child { margin-bottom: 0; }

  .fiche-tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .fiche-tag {
    padding: 4px 9px;
    border-radius: 3px;
    background: var(--bg3);
    border: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-title {
    font-family: var(--serif);
    font-size: 18px;
    color: var(--text-dim);
    margin-bottom: 8px;
    font-style: italic;
  }

  /* ─── SETUP ─── */
  .setup-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }
  .row-flex {
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 12px 14px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .row-flex .name {
    font-size: 13px;
    font-weight: 500;
    color: var(--cream);
  }
  .row-flex .desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
  }
  .row-flex .block-area { flex: 1; min-width: 0; }

  .project-edit-grid {
    display: grid;
    grid-template-columns: 1fr 2fr auto;
    gap: 10px;
    align-items: start;
  }

  .icon-btn {
    width: 28px; height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 3px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 14px;
    transition: all 0.15s;
    border: 1px solid transparent;
  }
  .icon-btn:hover {
    color: var(--text);
    background: var(--card2);
    border-color: var(--border-strong);
  }
  .icon-btn.danger:hover {
    color: var(--red);
    border-color: var(--red-dim);
  }

  /* ─── CAPTURE ─── */
  .capture-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 24px;
    align-items: start;
  }
  .capture-input textarea {
    min-height: 280px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
  }

  .source-suggest {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .source-suggest-chip {
    padding: 4px 9px;
    border-radius: 12px;
    border: 1px solid var(--border-strong);
    background: var(--bg2);
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .source-suggest-chip:hover {
    border-color: var(--green);
    color: var(--green);
  }
  .source-suggest-chip.active {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-dim);
  }

  /* ─── ANALYSE ─── */
  .analyse-stat {
    display: flex;
    gap: 24px;
    padding: 16px 20px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 20px;
  }
  .stat-block { display: flex; flex-direction: column; gap: 2px; }
  .stat-val {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 700;
    color: var(--cream);
  }
  .stat-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .progress-bar {
    height: 3px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green) 0%, var(--gold) 100%);
    transition: width 0.4s;
  }

  /* ─── TOOLBAR ─── */
  .toolbar {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .toolbar .filler { flex: 1; }
  .filter-group {
    display: inline-flex;
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    overflow: hidden;
  }
  .filter-btn {
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    border-right: 1px solid var(--border-strong);
    transition: all 0.15s;
  }
  .filter-btn:last-child { border-right: none; }
  .filter-btn:hover { color: var(--text); background: var(--card); }
  .filter-btn.active { color: var(--cream); background: var(--card2); }

  /* ─── SYNTHESE ─── */
  .synthese-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 12px;
  }
  .synthese-card {
    padding: 18px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    border-left: 3px solid;
  }
  .synthese-card.B1 { border-left-color: var(--green); }
  .synthese-card.B2 { border-left-color: var(--blue); }
  .synthese-card.B3 { border-left-color: var(--purple); }
  .synthese-card.B4 { border-left-color: var(--gold); }
  .synthese-card.B5 { border-left-color: var(--red); }
  .synthese-card.B6 { border-left-color: var(--orange); }
  .synthese-card-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .synthese-card-title {
    font-family: var(--serif);
    font-size: 15px;
    color: var(--cream);
    font-weight: 700;
  }
  .synthese-count {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }
  .synthese-card ul {
    list-style: none;
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .synthese-card li {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.4;
    padding-left: 12px;
    position: relative;
  }
  .synthese-card li::before {
    content: '·';
    position: absolute;
    left: 0;
    top: -2px;
    color: var(--muted-strong);
  }

  /* ─── INLINE EDIT ─── */
  .inline-edit {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 3px;
    padding: 4px 8px;
    width: 100%;
    color: inherit;
    font: inherit;
    transition: all 0.15s;
  }
  .inline-edit:hover { border-color: var(--border-strong); }
  .inline-edit:focus { border-color: var(--green); background: var(--bg2); }

  .helper {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    line-height: 1.5;
  }

  /* tiny */
  .hidden { display: none !important; }
  .row-actions { display: flex; gap: 4px; align-items: center; }
  .gap-12 { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .grow { flex: 1; }
  .right { text-align: right; }
  .small { font-size: 12px; }
  .mono { font-family: var(--mono); }
  .muted { color: var(--muted); }
  .dim { color: var(--text-dim); }
  .cream { color: var(--cream); }

  /* Toast */
  .toast-host {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .toast {
    background: var(--card2);
    border: 1px solid var(--border-strong);
    border-left: 3px solid var(--green);
    padding: 10px 16px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--text);
    animation: toast-in 0.3s ease-out;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  @keyframes toast-in {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* Responsive */
  @media (max-width: 980px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: relative; height: auto; }
    .triage-layout { grid-template-columns: 1fr; }
    .triage-detail { position: relative; max-height: none; }
    .capture-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
